<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ComedyVault">
  <title>ComedyVault</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <button id="back-btn" aria-label="Go back">‹</button>
      <h1><span>Comedy</span>Vault</h1>
    </header>

    <main>
      <div id="home-screen"   class="screen"></div>
      <div id="list-screen"   class="screen"></div>
      <div id="editor-screen" class="screen"></div>
      <div id="detail-screen" class="screen"></div>
      <div id="search-screen" class="screen"></div>
    </main>

    <button id="fab" aria-label="New entry">+</button>

    <nav id="bottom-nav" role="navigation" aria-label="Main navigation">
      <button data-screen="home" aria-label="Home">
        <span class="icon">🏠</span>
        <span>Home</span>
      </button>
      <button data-screen="search" aria-label="Search">
        <span class="icon">🔍</span>
        <span>Search</span>
      </button>
      <button data-screen="editor" aria-label="New entry">
        <span class="icon">✏️</span>
        <span>New</span>
      </button>
    </nav>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
